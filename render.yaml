services:
  - type: web
    name: wildlife-app
    runtime: node
    startCommand: npm --prefix backend run start
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && npm --prefix backend run build
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wildlife_db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: wildlife_db
    databaseName: wildlife_db
    user: wildlife_user
